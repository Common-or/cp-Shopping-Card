<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style/style.css" />
    <title>ShopCraft</title>
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <a href="#" class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          ShopCraft
        </a>
        <nav class="nav-links">
          <a href="#">New Arrivals</a>
          <a href="#">Collections</a>
          <a href="#">About</a>
        </nav>
        <div class="header-right">
          <button class="search-btn" aria-label="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
          <button class="cart-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
            Cart
            <span class="cart-badge total-items">0</span>
          </button>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="container">
        <div class="hero-badge">In Stock</div>
        <h1><span>Shop smarter.</span><br/>Everything you need.</h1>
        <p>Premium products curated for everyday life. Built with Object-Oriented JavaScript.</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-label">Total</div>
            <div class="hero-stat-val total">0 $</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-label">Items</div>
            <div class="hero-stat-val total-items">0</div>
          </div>
        </div>
      </div>
    </section>

    <section class="layout container">
      <aside class="sidebar">
        <div class="s-card">
          <div class="s-head">
            <h2>Your Cart</h2>
            <span class="s-badge total-items">0</span>
          </div>
          <div class="s-rows">
            <div class="s-row"><span class="s-label">Subtotal</span><span class="s-val total">0 $</span></div>
            <div class="s-row"><span class="s-label">Items</span><span class="s-val total-items">0</span></div>
          </div>
          <div class="s-footer">
            <div class="s-total-row">
              <span class="s-total-label">Total</span>
              <span class="s-total-val total">0 $</span>
            </div>
          </div>
        </div>
      </aside>

      <div class="products">
        <div class="p-head">
          <div>
            <h2>Products</h2>
            <p>Click + to add items to your cart.</p>
          </div>
          <span class="p-count">8 items</span>
        </div>
        <div class="grid list-products"></div>
      </div>
    </section>

    <script src="js/script.js"></script>
  </body>
</html>
